<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CareOS — Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#0f2137,#1a3a5c);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  </style>
</head>
<body>
<div class="card" style="width:420px;">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">🔑</div>
      <h3 class="fw-bold">Reset Password</h3>
      <p class="text-muted">Enter your email to receive a reset link</p>
    </div>
    <form method="POST">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" name="email" class="form-control form-control-lg" placeholder="your@email.com" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">Send Reset Link</button>
      <div class="text-center mt-3">
        <a href="{% url 'login' %}" class="text-muted small">Back to Login</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
