<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CareOS — New Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:linear-gradient(135deg,#0f2137,#1a3a5c);min-height:100vh;display:flex;align-items:center;justify-content:center;}</style>
</head>
<body>
<div class="card" style="width:420px;border:none;border-radius:16px;">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">🔒</div>
      <h4 class="fw-bold">Set New Password</h4>
    </div>
    {% if validlink %}
    <form method="POST">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">New Password</label>
        <input type="password" name="new_password1" class="form-control form-control-lg" required/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm New Password</label>
        <input type="password" name="new_password2" class="form-control form-control-lg" required/>
      </div>
      <button type="submit" class="btn btn-success btn-lg w-100">Set New Password</button>
    </form>
    {% else %}
    <div class="alert alert-danger">This reset link is invalid or has expired.</div>
    <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">Request New Link</a>
    {% endif %}
  </div>
</div>
</body>
</html>
