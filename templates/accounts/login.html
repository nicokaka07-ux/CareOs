<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CareOS — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#0f2137,#1a3a5c);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  </style>
</head>
<body>
<div class="card" style="width:420px;">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">❤️</div>
      <h2 class="fw-bold">CareOS</h2>
      <p class="text-muted">Hospital Management System</p>
    </div>
    {% if messages %}{% for msg in messages %}
    <div class="alert alert-danger py-2">{{ msg }}</div>
    {% endfor %}{% endif %}
    <form method="POST">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control form-control-lg" required autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">Sign In</button>
      <div class="text-center mt-3">
        <a href="{% url 'password_reset' %}" class="text-muted small">Forgot password?</a>
      </div>
    </form>
    <p class="text-center text-muted mt-4 mb-0 small">CareOS v1.0 — Secure Staff Access Only</p>
    <p class="text-center text-muted mt-2 mb-0 small">OTP authentication enabled for security</p>
  </div>
</div>
</body>
</html>
