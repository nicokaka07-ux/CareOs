{% extends 'base.html' %}
{% block title %}Add Drug{% endblock %}
{% block page_title %}Add Drug to Inventory{% endblock %}
{% block sidebar_links %}
  <div class="nav-section">Pharmacy</div>
  <a href="{% url 'pharmacy_queue' %}" class="nav-link"><i class="bi bi-capsule"></i> Queue</a>
  <a href="{% url 'drug_inventory' %}" class="nav-link"><i class="bi bi-box-seam"></i> Inventory</a>
  <a href="{% url 'add_drug' %}"       class="nav-link active"><i class="bi bi-plus-circle"></i> Add Drug</a>
{% endblock %}
{% block content %}
<div class="stat-card">
  <form method="POST">{% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label fw-semibold">Drug Name *</label><input type="text" name="name" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Generic Name</label><input type="text" name="generic_name" class="form-control"/></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Category</label>
        <select name="category" class="form-select">{% for val,label in categories %}<option value="{{ val }}">{{ label }}</option>{% endfor %}</select></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Unit</label><input type="text" name="unit" class="form-control" placeholder="e.g. Tablet, Vial"/></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Expiry Date</label><input type="date" name="expiry_date" class="form-control"/></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Buying Price (KES)</label><input type="number" name="buying_price" class="form-control" step="0.01" min="0" value="0"/></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Selling Price (KES)</label><input type="number" name="selling_price" class="form-control" step="0.01" min="0" value="0"/></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Opening Stock</label><input type="number" name="stock_quantity" class="form-control" min="0" value="0"/></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Minimum Stock Alert</label><input type="number" name="minimum_stock" class="form-control" min="1" value="10"/></div>
    </div>
    <div class="mt-4 d-flex gap-3">
      <button type="submit" class="btn btn-success px-4"><i class="bi bi-plus-circle me-2"></i>Add Drug</button>
      <a href="{% url 'drug_inventory' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
